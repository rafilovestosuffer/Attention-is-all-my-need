<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .scale { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid var(--paper-3); }
  .step  { flex: 1; height: 80px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; font-family: var(--font-mono); font-size: 10px; }
  .label { font-family: var(--font-sans); font-size: 11px; color: var(--ink-3); margin-bottom: 10px; display: flex; justify-content: space-between; }
  .axis  { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); display: flex; justify-content: space-between; margin-top: 8px; }
</style>
</head><body>
<div class="card">
  <div class="label"><span>Attention heat scale</span><span>used for softmax weight visualizations</span></div>
  <div class="scale">
    <div class="step" style="background: var(--heat-0); color: var(--ink)">0</div>
    <div class="step" style="background: var(--heat-1); color: var(--ink)">.2</div>
    <div class="step" style="background: var(--heat-2); color: var(--ink)">.4</div>
    <div class="step" style="background: var(--heat-3); color: var(--ink)">.6</div>
    <div class="step" style="background: var(--heat-4); color: #fff">.8</div>
    <div class="step" style="background: var(--heat-5); color: #fff">1.0</div>
  </div>
  <div class="axis"><span>weight ≈ 0</span><span>uniform</span><span>focused</span><span>weight ≈ 1</span></div>
</div>
</body></html>
