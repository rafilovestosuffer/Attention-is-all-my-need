<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px 28px; }
  .stack > * + * { margin-top: 14px; }
  .field label {
    display: flex; justify-content: space-between; align-items: baseline;
    font-family: var(--font-sans); font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-3);
    margin-bottom: 6px;
  }
  .field label .hint { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0; text-transform: none; color: var(--ink-4); font-weight: 400; }

  .input-wrap { position: relative; display: flex; align-items: center; }
  .prefix, .suffix {
    position: absolute; font-family: var(--font-mono); font-size: 12px; color: var(--ink-4);
    pointer-events: none;
  }
  .prefix { left: 12px; }
  .suffix { right: 12px; }

  .input {
    width: 100%; box-sizing: border-box;
    font-family: var(--font-sans); font-size: 14px;
    padding: 10px 14px;
    background: #fff;
    border: 1px solid var(--paper-edge);
    border-radius: 6px;
    color: var(--ink);
    box-shadow: var(--shadow-inset);
    transition: border-color 180ms, box-shadow 180ms, background 180ms;
    outline: none;
  }
  .input:hover   { border-color: var(--ink-4); }
  .input:focus   { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(26,31,43,0.08), var(--shadow-inset); background: #fff; }
  .input.err     { border-color: var(--err); }
  .input.err:focus { box-shadow: 0 0 0 3px rgba(154,42,42,0.14); }
  .input.num     { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .input.with-prefix { padding-left: 32px; }
  .input.with-suffix { padding-right: 48px; }

  .help     { font-size: 12px; color: var(--ink-3); margin-top: 5px; line-height: 1.4; }
  .help.err { color: var(--err); display: flex; align-items: center; gap: 5px; }
  .help.ok  { color: var(--ok);  display: flex; align-items: center; gap: 5px; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* Slider */
  .slider-wrap { display: flex; align-items: center; gap: 12px; }
  .slider {
    -webkit-appearance: none; appearance: none;
    flex: 1; height: 4px; border-radius: 999px;
    background: linear-gradient(to right, var(--query) 0%, var(--query) 65%, var(--paper-3) 65%, var(--paper-3) 100%);
    outline: none; cursor: pointer;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 999px;
    background: var(--ink); border: 2px solid #fff;
    box-shadow: var(--shadow-2); cursor: grab;
  }
  .slider-val {
    font-family: var(--font-mono); font-variant-numeric: tabular-nums;
    font-size: 12px; font-weight: 600; color: var(--ink);
    min-width: 44px; text-align: right;
    padding: 3px 8px; background: var(--paper); border: 1px solid var(--paper-3); border-radius: 4px;
  }

  /* Running ghost / valid mark */
  .glyph { font-family: var(--font-mono); font-size: 11px; }
</style>
</head><body>
<div class="card">
  <div class="stack">
    <div class="field">
      <label>Temperature <span class="hint">softmax T · keys ↑↓</span></label>
      <div class="input-wrap">
        <span class="prefix">T =</span>
        <input class="input num with-prefix with-suffix" value="1.00" />
        <span class="suffix">· focus</span>
      </div>
      <div class="help ok"><span class="glyph">✓</span>softmax well-conditioned · row-sum 1.000</div>
    </div>

    <div class="field">
      <label>Heat level <span class="hint">live slider · drag to preview</span></label>
      <div class="slider-wrap">
        <input class="slider" type="range" min="0" max="100" value="65" />
        <span class="slider-val">0.65</span>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Heads <span class="hint">h</span></label>
        <input class="input num" value="8" />
        <div class="help">d<sub>model</sub> 512 ÷ 8 = 64</div>
      </div>
      <div class="field">
        <label><em style="color:var(--err);font-style:normal">d<sub>k</sub></em> <span class="hint">dimension per head</span></label>
        <input class="input num err" value="seven" />
        <div class="help err"><span class="glyph">✕</span>not an integer · expected 64</div>
      </div>
    </div>
  </div>
</div>
</body></html>
