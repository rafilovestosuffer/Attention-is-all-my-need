<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { grid-template-columns: repeat(5, 1fr); }
  .swatch { min-height: 96px; color: var(--paper); border-color: transparent; }
</style>
</head><body>
<div class="card">
  <div class="grid">
    <div class="swatch" style="background: var(--ink);">
      <span class="swatch__name">ink</span>
      <span class="swatch__hex">#1A1F2B</span>
    </div>
    <div class="swatch" style="background: var(--ink-2);">
      <span class="swatch__name">ink-2</span>
      <span class="swatch__hex">#303848</span>
    </div>
    <div class="swatch" style="background: var(--ink-3);">
      <span class="swatch__name">ink-3</span>
      <span class="swatch__hex">#5A6378</span>
    </div>
    <div class="swatch" style="background: var(--ink-4); color: var(--ink);">
      <span class="swatch__name">ink-4</span>
      <span class="swatch__hex">#8891A4</span>
    </div>
    <div class="swatch" style="background: var(--ink-5); color: var(--ink);">
      <span class="swatch__name">ink-5</span>
      <span class="swatch__hex">#B9C0CD</span>
    </div>
  </div>
</div>
</body></html>
