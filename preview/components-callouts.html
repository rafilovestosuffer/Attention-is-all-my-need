<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .bar { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px; font-family: var(--font-sans); font-size: 13px; }
  .bar + .bar { margin-top: 8px; }
  .bar .ico { font-family: var(--font-mono); font-weight: 700; width: 20px; text-align: center; }
  .info { background: var(--key-soft); color: var(--key-ink); }
  .warn { background: var(--warn-soft); color: var(--warn); }
  .err  { background: var(--err-soft);  color: var(--err); }
  .ok   { background: var(--ok-soft);   color: var(--ok); }
</style>
</head><body>
<div class="card">
  <div class="bar info">  <span class="ico">i</span> The matrix Q has shape [8, 64, 512]. Hover any row to see its attention pattern.</div>
  <div class="bar ok">    <span class="ico">✓</span> All shapes check out. You can run the cell.</div>
  <div class="bar warn">  <span class="ico">!</span> dₖ = 63 isn't divisible by 8 heads. Try 64.</div>
  <div class="bar err">   <span class="ico">✕</span> This matrix has 3 columns but the next expects 4. Try reshaping.</div>
</div>
</body></html>
