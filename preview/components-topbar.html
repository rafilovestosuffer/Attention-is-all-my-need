<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: color-mix(in oklch, var(--paper) 85%, transparent); backdrop-filter: blur(12px); border: 1px solid var(--paper-3); border-radius: 10px; }
  .left { display: flex; align-items: center; gap: 12px; font-family: var(--font-sans); font-size: 13px; color: var(--ink-3); }
  .left b { color: var(--ink); font-family: var(--font-display); font-weight: 500; font-style: italic; font-size: 16px; }
  .track { width: 140px; height: 3px; background: var(--paper-3); border-radius: 999px; position: relative; overflow: hidden; }
  .track i { position: absolute; inset: 0; width: 62%; background: var(--ink); }
  .right { display: flex; gap: 10px; align-items: center; font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }
  .kbd { font-family: var(--font-mono); font-size: 10px; padding: 2px 6px; border: 1px solid var(--paper-3); border-radius: 3px; background: var(--paper-2); color: var(--ink); }
</style>
</head><body>
<div class="card" style="background: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%226%22 height=%226%22><circle cx=%221%22 cy=%221%22 r=%220.5%22 fill=%22%23E6DBC4%22/></svg>') var(--paper);">
  <div class="bar">
    <div class="left">
      <b>Chapter 4</b>
      <span>·</span>
      <span>Multi-head attention</span>
      <div class="track"><i></i></div>
    </div>
    <div class="right">
      <span class="kbd">j</span> next  <span class="kbd">k</span> prev  <span class="kbd">/</span> search
    </div>
  </div>
</div>
</body></html>
