<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; align-items: flex-end; gap: 12px; }
  .b { background: var(--paper-3); border-radius: 2px; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); margin-top: 6px; text-align: center; }
  .col { display: flex; flex-direction: column; align-items: center; }
</style>
</head><body>
<div class="card">
  <div class="row">
    <div class="col"><div class="b" style="width: 4px;  height: 56px;"></div><div class="tag">1 · 4px</div></div>
    <div class="col"><div class="b" style="width: 8px;  height: 56px;"></div><div class="tag">2 · 8</div></div>
    <div class="col"><div class="b" style="width: 12px; height: 56px;"></div><div class="tag">3 · 12</div></div>
    <div class="col"><div class="b" style="width: 16px; height: 56px;"></div><div class="tag">4 · 16</div></div>
    <div class="col"><div class="b" style="width: 24px; height: 56px;"></div><div class="tag">5 · 24</div></div>
    <div class="col"><div class="b" style="width: 32px; height: 56px;"></div><div class="tag">6 · 32</div></div>
    <div class="col"><div class="b" style="width: 48px; height: 56px;"></div><div class="tag">7 · 48</div></div>
    <div class="col"><div class="b" style="width: 64px; height: 56px;"></div><div class="tag">8 · 64</div></div>
    <div class="col"><div class="b" style="width: 96px; height: 56px;"></div><div class="tag">9 · 96</div></div>
    <div class="col"><div class="b" style="width: 128px;height: 56px;"></div><div class="tag">10 · 128</div></div>
  </div>
  <div style="margin-top: 16px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-3);">8pt grid with a 4pt half-step · use --s-1 … --s-10</div>
</div>
</body></html>
