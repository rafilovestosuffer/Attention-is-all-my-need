<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .chip { font-family: var(--font-mono); font-size: 11px; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--paper-3); background: var(--paper-2); color: var(--ink-3); }
  .chip.q { background: var(--query-soft); color: var(--query-ink); border-color: transparent; }
  .chip.k { background: var(--key-soft);   color: var(--key-ink);   border-color: transparent; }
  .chip.v { background: var(--value-soft); color: var(--value-ink); border-color: transparent; }
  .chip.solid { background: var(--ink); color: var(--paper); border-color: transparent; }
  .tag  { font-family: var(--font-sans); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; padding: 3px 10px; border-radius: 3px; }
  .tag.ok   { background: var(--ok-soft);   color: var(--ok); }
  .tag.warn { background: var(--warn-soft); color: var(--warn); }
  .tag.err  { background: var(--err-soft);  color: var(--err); }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.1em; margin: 14px 0 8px; display: block; }
</style>
</head><body>
<div class="card">
  <span class="label">CHIPS · tensor + role tags</span>
  <div class="row">
    <span class="chip">[8, 64, 512]</span>
    <span class="chip q">Q</span>
    <span class="chip k">K</span>
    <span class="chip v">V</span>
    <span class="chip">head 0</span>
    <span class="chip solid">dₖ = 64</span>
  </div>
  <span class="label">STATUS · ok / warn / err</span>
  <div class="row">
    <span class="tag ok">Solved</span>
    <span class="tag warn">Check your shapes</span>
    <span class="tag err">Incompatible</span>
  </div>
</div>
</body></html>
