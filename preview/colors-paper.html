<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { grid-template-columns: repeat(5, 1fr); }
  .swatch { min-height: 96px; color: var(--ink); }
</style>
</head><body>
<div class="card">
  <div class="grid">
    <div class="swatch" style="background: var(--paper);">
      <span class="swatch__name">paper</span>
      <span class="swatch__hex">#F6F1E7</span>
    </div>
    <div class="swatch" style="background: var(--paper-2);">
      <span class="swatch__name">paper-2</span>
      <span class="swatch__hex">#EFE7D6</span>
    </div>
    <div class="swatch" style="background: var(--paper-3);">
      <span class="swatch__name">paper-3</span>
      <span class="swatch__hex">#E6DBC4</span>
    </div>
    <div class="swatch" style="background: var(--paper-edge);">
      <span class="swatch__name">paper-edge</span>
      <span class="swatch__hex">#D9CBB0</span>
    </div>
    <div class="swatch" style="background: var(--white); border-color: var(--paper-edge);">
      <span class="swatch__name">white</span>
      <span class="swatch__hex">#FFFFFF</span>
    </div>
  </div>
</div>
</body></html>
