<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .btn { font-family: var(--font-sans); font-weight: 500; font-size: 14px; padding: 10px 18px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; transition: all 220ms; line-height: 1; display: inline-flex; align-items: center; gap: 8px; }
  .primary   { background: var(--ink);  color: var(--paper); }
  .primary:hover   { background: var(--ink-2); }
  .secondary { background: var(--paper-2); color: var(--ink); border-color: var(--paper-edge); }
  .secondary:hover { background: var(--paper-3); }
  .ghost     { background: transparent; color: var(--ink); }
  .ghost:hover { background: var(--paper-2); }
  .query-btn { background: var(--query); color: #fff; }
  .disabled  { opacity: .4; cursor: not-allowed; }
  .small     { font-size: 12px; padding: 6px 12px; }
  .lg        { font-size: 16px; padding: 14px 22px; }
  .label     { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); margin-bottom: 6px; }
</style>
</head><body>
<div class="card">
  <div class="label">PRIMARY · SECONDARY · GHOST · ACCENT · DISABLED</div>
  <div class="row">
    <button class="btn primary">Continue</button>
    <button class="btn secondary">Reset diagram</button>
    <button class="btn ghost">Skip chapter</button>
    <button class="btn query-btn">Run this cell</button>
    <button class="btn primary disabled">Continue</button>
  </div>
  <div class="label" style="margin-top: 18px;">SIZES · sm / md / lg</div>
  <div class="row">
    <button class="btn primary small">Continue</button>
    <button class="btn primary">Continue</button>
    <button class="btn primary lg">Continue</button>
  </div>
</div>
</body></html>
