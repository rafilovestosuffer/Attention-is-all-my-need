<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .rail { background: var(--paper-2); border: 1px solid var(--paper-3); border-radius: 10px; padding: 18px 20px; display: flex; flex-direction: column; gap: 10px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.1em; }
  .title { font-family: var(--font-display); font-weight: 500; font-size: 18px; color: var(--ink); }
  .track { height: 4px; background: var(--paper-3); border-radius: 999px; position: relative; }
  .track .fill { position: absolute; inset: 0; width: 62%; background: var(--ink); border-radius: 999px; }
  .steps { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }
  .steps b { color: var(--ink); font-weight: 600; }
</style>
</head><body>
<div class="card">
  <div class="rail">
    <div class="meta">CHAPTER 4 · 62% complete</div>
    <div class="title">Multi-head attention</div>
    <div class="track"><div class="fill"></div></div>
    <div class="steps">
      <span>§1 Intuition</span>
      <span>§2 Shapes</span>
      <span><b>§3 Splitting Q/K/V</b></span>
      <span>§4 Recombine</span>
      <span>§5 Exercises</span>
    </div>
  </div>
</div>
</body></html>
