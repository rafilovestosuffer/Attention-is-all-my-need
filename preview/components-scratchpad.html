<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .panel { background: #fff; border: 1px solid var(--paper-edge); border-radius: 10px; overflow: hidden; }
  .bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--paper-2); border-bottom: 1px solid var(--paper-3); font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }
  .bar .title { display: flex; align-items: center; gap: 8px; }
  .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--query); }
  .run { background: var(--query); color: #fff; border: 0; font-family: var(--font-sans); font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
  pre { margin: 0; padding: 14px 16px; background: #15181F; color: #E5E0D2; font-family: var(--font-mono); font-size: 12px; line-height: 1.6; }
  .kw { color: #E6A968; } .nm { color: #D6C78A; } .cm { color: #6A685E; }
  .out { padding: 10px 16px; background: #fff; font-family: var(--font-mono); font-size: 12px; color: var(--ink); border-top: 1px solid var(--paper-3); }
  .out b { color: var(--query); }
</style>
</head><body>
<div class="card">
  <div class="panel">
    <div class="bar">
      <div class="title"><span class="dot"></span> scratchpad · cell 3</div>
      <button class="run">▸ run</button>
    </div>
<pre><span class="cm"># scale + softmax</span>
scores = q @ k.T / math.sqrt(<span class="nm">64</span>)
weights = scores.softmax(dim=-<span class="nm">1</span>)
weights.shape</pre>
    <div class="out">→ <b>torch.Size([6, 6])</b></div>
  </div>
</div>
</body></html>
